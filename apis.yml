description: >-
  Dow Jones is a financial news and information provider that publishes The Wall
  Street Journal, Barron's, MarketWatch, and Financial News, and operates a portfolio
  of professional information services including Factiva, Dow Jones Newswires, and
  Dow Jones Risk and Compliance. The Dow Jones Developer Platform exposes APIs and
  data services that give developers programmatic access to Dow Jones content, market
  data, company and people intelligence, and risk and compliance datasets.
